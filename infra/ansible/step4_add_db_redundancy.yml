---
- name: Step 4 - DB redundancy topology
  hosts: db
  become: true
  roles:
    - db

- name: Step 4 - DB HAProxy
  hosts: lb_db
  become: true
  vars:
    lb_mode: tcp
    frontend_port: 3306
    backend_group: db
    backend_port: 3306
  roles:
    - lb

- name: Step 4 - Web tier using DB LB endpoint
  hosts: web
  become: true
  vars:
    db_endpoint: "{{ hostvars[groups['lb_db'][0]].ansible_host | default(groups['lb_db'][0]) }}"
  roles:
    - web

- name: Step 4 - Web HAProxy
  hosts: lb_web
  become: true
  vars:
    lb_mode: http
    frontend_port: 80
    backend_group: web
    backend_port: 80
  roles:
    - lb

