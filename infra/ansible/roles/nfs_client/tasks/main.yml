---
- name: Install NFS client package
  ansible.builtin.apt:
    name: nfs-common
    state: present
    update_cache: true

- name: Ensure mount directory exists
  ansible.builtin.file:
    path: "{{ nfs_mount_dir }}"
    state: directory
    mode: "0755"

- name: Mount NFS export on web root
  ansible.builtin.mount:
    src: "{{ nfs_server_ip }}:{{ nfs_export_dir }}"
    path: "{{ nfs_mount_dir }}"
    fstype: nfs
    opts: rw
    state: mounted

