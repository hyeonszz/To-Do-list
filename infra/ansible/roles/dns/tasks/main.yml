---
- name: Install bind9
  ansible.builtin.apt:
    name:
      - bind9
      - bind9utils
    state: present
    update_cache: true

- name: Configure named local zones
  ansible.builtin.template:
    src: named.conf.local.j2
    dest: /etc/bind/named.conf.local
    owner: root
    group: bind
    mode: "0644"
  notify: Restart bind9

- name: Configure forward zone file
  ansible.builtin.template:
    src: db.zone.j2
    dest: "/etc/bind/db.{{ dns_zone_name }}"
    owner: root
    group: bind
    mode: "0644"
  notify: Restart bind9

- name: Ensure bind9 is running
  ansible.builtin.service:
    name: bind9
    state: started
    enabled: true

