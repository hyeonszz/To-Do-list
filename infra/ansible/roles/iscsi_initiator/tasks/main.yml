---
- name: Install iSCSI initiator package
  ansible.builtin.apt:
    name: open-iscsi
    state: present
    update_cache: true

- name: Discover iSCSI targets
  ansible.builtin.command:
    cmd: "iscsiadm -m discovery -t sendtargets -p {{ iscsi_target_ip }}"
  register: iscsi_discovery
  changed_when: false

- name: Log in to iSCSI target
  ansible.builtin.command:
    cmd: "iscsiadm -m node -T {{ iscsi_iqn }} -p {{ iscsi_target_ip }} -l"
  register: iscsi_login
  failed_when: false
  changed_when: "'successful' in iscsi_login.stdout | lower"

- name: Show iSCSI mount reminder
  ansible.builtin.debug:
    msg: "iSCSI session configured. Set iscsi_enable_mount=true to continue with filesystem/mount automation."

