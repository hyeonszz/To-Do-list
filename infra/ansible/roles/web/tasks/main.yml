---
- name: Install Apache + PHP
  ansible.builtin.apt:
    name:
      - apache2
      - php
      - php-mysql
    state: present
    update_cache: true

- name: Deploy PHP index page
  ansible.builtin.template:
    src: index.php.j2
    dest: /var/www/html/index.php
    owner: root
    group: root
    mode: "0644"

- name: Ensure Apache is running
  ansible.builtin.service:
    name: apache2
    state: started
    enabled: true

