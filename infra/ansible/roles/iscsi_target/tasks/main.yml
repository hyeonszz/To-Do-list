---
- name: Install iSCSI target package
  ansible.builtin.apt:
    name: tgt
    state: present
    update_cache: true

- name: Ensure backing store directory exists
  ansible.builtin.file:
    path: "{{ iscsi_backing_file | dirname }}"
    state: directory
    mode: "0755"

- name: Create backing store file
  ansible.builtin.command:
    cmd: "dd if=/dev/zero of={{ iscsi_backing_file }} bs=1M count={{ iscsi_backing_size_mb }}"
    creates: "{{ iscsi_backing_file }}"
  changed_when: true

- name: Configure iSCSI target
  ansible.builtin.template:
    src: mysql-target.conf.j2
    dest: /etc/tgt/conf.d/mysql-target.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart tgt

- name: Ensure tgt service is running
  ansible.builtin.service:
    name: tgt
    state: started
    enabled: true

