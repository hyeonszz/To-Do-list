---
- name: Install NFS server package
  ansible.builtin.apt:
    name: nfs-kernel-server
    state: present
    update_cache: true

- name: Create export directory
  ansible.builtin.file:
    path: "{{ nfs_export_dir }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Place shared index.php
  ansible.builtin.template:
    src: index.php.j2
    dest: "{{ nfs_export_dir }}/index.php"
    owner: www-data
    group: www-data
    mode: "0644"

- name: Configure NFS export
  ansible.builtin.lineinfile:
    path: /etc/exports
    line: "{{ nfs_export_dir }} {{ nfs_clients_cidr }}(rw,sync,no_subtree_check,no_root_squash)"
    create: true
  notify: Refresh NFS export

- name: Ensure NFS service is running
  ansible.builtin.service:
    name: nfs-kernel-server
    state: started
    enabled: true

