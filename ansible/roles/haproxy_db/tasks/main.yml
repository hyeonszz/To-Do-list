---
- name: HAProxy 설치
  dnf:
    name:
      - haproxy
      - python3-libsemanage
    state: present

- name: SELinux - haproxy connect any port 허용
  ansible.posix.seboolean:
    name: haproxy_connect_any
    state: true
    persistent: true

- name: HAProxy 설정 파일 배포
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: '0644'
  notify: restart haproxy

- name: HAProxy 시작 및 자동시작 등록
  service:
    name: haproxy
    state: started
    enabled: true

- name: 방화벽 5432 포트 허용 (PostgreSQL)
  firewalld:
    port: 5432/tcp
    permanent: true
    state: enabled
    immediate: true
