---
- name: PostgreSQL 설치
  dnf:
    name:
      - postgresql-server
      - postgresql-contrib
      - python3-psycopg2
    state: present

- name: PostgreSQL 초기화
  command: postgresql-setup --initdb
  args:
    creates: /var/lib/pgsql/data/postgresql.conf

- name: PostgreSQL 시작 및 자동시작 등록
  service:
    name: postgresql
    state: started
    enabled: true

- name: 방화벽 PostgreSQL 허용
  firewalld:
    service: postgresql
    permanent: true
    state: enabled
    immediate: true

- name: 원격 접속 허용 (postgresql.conf)
  lineinfile:
    path: /var/lib/pgsql/data/postgresql.conf
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '*'"
  notify: restart postgresql

- name: 원격 접속 허용 (pg_hba.conf)
  lineinfile:
    path: /var/lib/pgsql/data/pg_hba.conf
    line: "host    all             all             0.0.0.0/0               md5"
    insertafter: EOF
  notify: restart postgresql

- name: DB 생성
  become_user: postgres
  postgresql_db:
    name: "{{ db_name }}"
    state: present

- name: DB 사용자 생성 및 권한 부여
  become_user: postgres
  postgresql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    db: "{{ db_name }}"
    priv: "ALL"
    state: present

- name: public 스키마 권한 부여
  become_user: postgres
  postgresql_privs:
    db: "{{ db_name }}"
    role: "{{ db_user }}"
    type: schema
    objs: public
    privs: ALL

- name: 테이블 생성 및 샘플 데이터 삽입
  become_user: postgres
  postgresql_query:
    db: "{{ db_name }}"
    query: |
      CREATE TABLE IF NOT EXISTS {{ db_table }} (
        id   SERIAL PRIMARY KEY,
        name VARCHAR(50) NOT NULL
      );
      INSERT INTO {{ db_table }} (id, name) VALUES (1, 'kim'), (2, 'lee')
      ON CONFLICT (id) DO NOTHING;

