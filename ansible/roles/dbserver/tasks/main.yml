---
- name: Install MariaDB
  dnf:
    name:
      - mariadb-server
      - python3-PyMySQL
    state: present

- name: Start and enable MariaDB
  service:
    name: mariadb
    state: started
    enabled: true

- name: Ensure DB password provided
  assert:
    that:
      - db_password is defined
      - db_password | length > 0
    fail_msg: "Set TODOAPP_DB_PASSWORD before running ansible-playbook."

- name: Allow MySQL in firewalld
  firewalld:
    service: mysql
    permanent: true
    state: enabled
    immediate: true

- name: Create database
  mysql_db:
    name: "{{ db_name }}"
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock

- name: Create database user and grant privileges
  mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    priv: "{{ db_name }}.*:ALL"
    host: "%"
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock

- name: Create table and seed sample data
  mysql_query:
    login_db: "{{ db_name }}"
    login_unix_socket: /var/lib/mysql/mysql.sock
    query:
      - |
        CREATE TABLE IF NOT EXISTS {{ db_table }} (
          id   INT AUTO_INCREMENT PRIMARY KEY,
          name VARCHAR(50) NOT NULL
        );
      - |
        INSERT IGNORE INTO {{ db_table }} (id, name) VALUES (1, 'kim'), (2, 'lee');
