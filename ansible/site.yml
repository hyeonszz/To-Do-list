---
# 1단계: WebServer + DatabaseServer (PHP 연동)
- name: DB 서버 구성
  hosts: dbservers
  become: true
  roles:
    - dbserver

- name: Web 서버 구성
  hosts: webservers
  become: true
  roles:
    - webserver

# 2단계: HAProxy 웹 로드밸런서 구성
- name: 웹 로드밸런서 구성 (HAProxy)
  hosts: lbweb
  become: true
  roles:
    - haproxy_web

# 3단계: HAProxy DB 로드밸런서 구성
- name: DB 로드밸런서 구성 (HAProxy)
  hosts: lbdb
  become: true
  roles:
    - haproxy_db

# 4단계: 웹서버 PHP → DB 로드밸런서 경유 연결
- name: 웹서버 index.php DB 연결을 lbdb1으로 변경
  hosts: webservers
  become: true
  roles:
    - webserver

# 5단계: NFS 서버 구성 + 웹서버 NFS 마운트
- name: NFS 서버 구성
  hosts: nfs
  become: true
  roles:
    - nfs_server

- name: 웹서버 NFS 마운트 (index.php 공유)
  hosts: webservers
  become: true
  roles:
    - nfs_client

# 6단계: iSCSI 서버 구성 + DB 서버 iSCSI 마운트 + LVM
- name: iSCSI 서버 구성
  hosts: iscsi
  become: true
  roles:
    - iscsi_server

- name: DB 서버 iSCSI 클라이언트 + LVM 구성
  hosts: dbservers
  become: true
  roles:
    - iscsi_client

# 7단계: DNS 서버 구성 + 모든 VM DNS 설정
- name: DNS 서버 구성
  hosts: dns
  become: true
  roles:
    - dns_server

- name: 모든 VM DNS 클라이언트 설정
  hosts: all
  become: true
  roles:
    - dns_client
